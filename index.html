    <link rel="canonical" href="/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="icon" type="image/png" href="/img/icons8-dev-641.png" />
  </head>

  <body>
    <div id="root"></div>
    <script>
      (function () {
        var canonicalUrl = window.location.origin + window.location.pathname;
        var canonical = document.querySelector('link[rel="canonical"]');
        if (canonical) canonical.setAttribute("href", canonicalUrl);
        var ogUrl = document.querySelector('meta[property="og:url"]');
        if (ogUrl) ogUrl.setAttribute("content", canonicalUrl);

        var person = {
          "@context": "https://schema.org",
          "@type": "Person",
          name: "Marcelo Batista",
          jobTitle: "Full Stack Developer",
          description:
            "Desenvolvedor Full Stack com foco em React, Node.js, .NET e construção de produtos digitais performáticos.",
          url: window.location.origin,
          email: "mailto:batistazul37@gmail.com",
          sameAs: [
            "https://github.com/MarceloBatistazul",
            "https://www.linkedin.com/in/marcelo-batista-561871219/",
            "https://mbcodesolutions.vercel.app/"
          ]
        };

        var ld = document.createElement("script");
        ld.type = "application/ld+json";
        ld.text = JSON.stringify(person);
        document.head.appendChild(ld);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
