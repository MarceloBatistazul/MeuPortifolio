          telephone: "+55 16 99742-9305",
          address: {
            "@type": "PostalAddress",
            addressLocality: "Ribeirão Preto",
            addressRegion: "SP",
            addressCountry: "BR"
          },
          url: canonicalUrl,
          image: window.location.origin + "/img/FotoPerfilDev.webp",

          url: canonicalUrl,
          inLanguage: "pt-BR",
          author: {
            "@type": "Person",
            name: "Marcelo Batista"
          }
        };

        var personLd = document.createElement("script");
        personLd.type = "application/ld+json";
        personLd.text = JSON.stringify(person);
        document.head.appendChild(personLd);

        var websiteLd = document.createElement("script");
        websiteLd.type = "application/ld+json";
        websiteLd.text = JSON.stringify(website);
        document.head.appendChild(websiteLd);
      })();
